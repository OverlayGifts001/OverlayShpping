    <title>OVERLAY SHOPPING </title>
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; --grey: #1a1a1a; --white: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--black); color: var(--white); text-align: center; }
        header { padding: 60px 20px; border-bottom: 2px solid var(--gold); background: #000; }
        h1 { color: var(--gold); letter-spacing: 5px; margin: 0; font-size: 2.2rem; }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .category-title { color: var(--gold); text-align: left; border-left: 3px solid var(--gold); padding-left: 15px; margin: 40px 0 20px; font-weight: 300; text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--grey); border-radius: 12px; padding: 15px; border: 1px solid #333; transition: 0.3s; text-decoration: none; color: white; display: block; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; filter: grayscale(30%); }
        .card:hover img { filter: grayscale(0%); }
        .card h3 { margin: 10px 0 5px; font-size: 1.1rem; color: var(--gold); }
        .card p { font-size: 0.85rem; color: #aaa; margin-bottom: 15px; height: 40px; }
        .btn { display: block; padding: 12px; background: var(--gold); color: black; font-weight: bold; border-radius: 4px; text-transform: uppercase; font-size: 0.8rem; }
        footer { padding: 40px; color: #555; font-size: 0.8rem; border-top: 1px solid #222; margin-top: 60px; }
    </style>
</head>
